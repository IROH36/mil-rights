<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mil-Rights — U.S. Military Rights Guide</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a2f5e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mil-Rights">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #eef1f7;
      color: #0f172a;
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── DISCLAIMER ──────────────────────────────────── */
    .disclaimer {
      flex-shrink: 0;
      background: #991b1b;
      color: #fff;
      text-align: center;
      padding: 6px 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    /* ── HEADER ──────────────────────────────────────── */
    .header {
      flex-shrink: 0;
      color: #fff;
      padding: 14px 16px 13px;
    }
    .hrow { display: flex; align-items: center; gap: 6px; }
    .back-btn {
      background: none; border: none; color: rgba(255,255,255,0.8);
      font-size: 28px; line-height: 1; cursor: pointer;
      padding: 0 4px 0 0; margin-left: -4px;
    }
    .htitle { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .hsub   { font-size: 12px; color: rgba(255,255,255,.55); margin-top: 2px; }

    /* ── CONTENT ─────────────────────────────────────── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }

    /* ── CATEGORY GRID ───────────────────────────────── */
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .cat-card {
      background: #fff;
      border-radius: 18px;
      padding: 20px 12px 17px;
      box-shadow: 0 2px 14px rgba(15,23,42,0.09), 0 0 0 1px rgba(15,23,42,0.05);
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .cat-card:active { transform: scale(0.97); box-shadow: 0 1px 6px rgba(15,23,42,0.07); }
    .cat-icon {
      width: 54px; height: 54px; border-radius: 15px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px;
    }
    .cat-name  { font-size: 13px; font-weight: 700; line-height: 1.3; color: #0f172a; }
    .cat-count { font-size: 11px; color: #94a3b8; margin-top: 4px; font-weight: 500; }

    /* ── TOPIC LIST ITEM ─────────────────────────────── */
    .topic-item {
      background: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 8px;
      box-shadow: 0 1px 8px rgba(15,23,42,0.07), 0 0 0 1px rgba(15,23,42,0.04);
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; user-select: none;
    }
    .topic-item:active { background: #f8fafc; }
    .tinfo  { flex: 1; min-width: 0; }
    .ttitle { font-size: 15px; font-weight: 600; line-height: 1.3; color: #0f172a; }
    .tmeta  { font-size: 12px; color: #64748b; margin-top: 3px; font-weight: 500; }
    .fav-dot { width: 8px; height: 8px; background: #dc2626; border-radius: 50%; flex-shrink: 0; }
    .chevron { color: #cbd5e1; flex-shrink: 0; }
    .chevron svg { display: block; }
    .personalize-card .chevron { color: rgba(255,255,255,.5); }

    /* ── TOPIC DETAIL ────────────────────────────────── */
    .detail-head {
      color: #fff;
      padding: 22px 16px 18px;
      margin: -16px -16px 16px;
    }
    .detail-title  { font-size: 20px; font-weight: 700; line-height: 1.35; }
    .source-badge  {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,.15); border-radius: 20px;
      padding: 4px 12px; font-size: 12px; margin-top: 10px;
      font-weight: 600;
    }
    .summary-card {
      background: #fff; border-radius: 16px;
      padding: 18px; margin-bottom: 12px;
      box-shadow: 0 1px 8px rgba(15,23,42,0.07), 0 0 0 1px rgba(15,23,42,0.04);
    }
    .summary-text  { font-size: 15px; line-height: 1.7; color: #334155; }
    .summary-empty { font-size: 14px; color: #94a3b8; font-style: italic; }

    /* ── BUTTONS ─────────────────────────────────────── */
    .btn {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; width: 100%; border-radius: 14px; padding: 15px;
      font-size: 15px; font-weight: 600; cursor: pointer; border: none;
      margin-bottom: 10px; text-decoration: none;
    }
    .btn-primary {
      background: #2563eb; color: #fff;
      box-shadow: 0 4px 16px rgba(37,99,235,0.28);
    }
    .btn-primary:active { background: #1d4ed8; box-shadow: none; }
    .btn-secondary {
      background: #fff; color: #1e293b; font-weight: 500;
      box-shadow: 0 1px 8px rgba(15,23,42,0.07), 0 0 0 1px rgba(15,23,42,0.08);
    }
    .btn-secondary:active { background: #f8fafc; }
    .btn-fav {
      color: #dc2626 !important;
      box-shadow: 0 0 0 1.5px #fca5a5, 0 1px 8px rgba(15,23,42,0.05) !important;
    }

    /* ── TAGS ────────────────────────────────────────── */
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag {
      background: #eff6ff; color: #2563eb;
      border-radius: 20px; padding: 3px 10px;
      font-size: 11px; font-weight: 600;
    }
    .verified-note { font-size: 11px; color: #94a3b8; text-align: center; margin-top: 16px; }

    /* ── SEARCH ──────────────────────────────────────── */
    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-input {
      width: 100%; padding: 13px 16px 13px 44px;
      border: none; border-radius: 14px;
      font-size: 15px; background: #fff; outline: none; color: #0f172a;
      box-shadow: 0 1px 8px rgba(15,23,42,0.07), 0 0 0 1px rgba(15,23,42,0.07);
    }
    .search-input:focus { box-shadow: 0 0 0 2px #2563eb, 0 1px 12px rgba(37,99,235,0.12); }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; pointer-events: none; }

    /* ── SECTION LABEL ───────────────────────────────── */
    .slabel {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .7px; color: #94a3b8; margin-bottom: 10px;
    }

    /* ── EMPTY STATE ─────────────────────────────────── */
    .empty { text-align: center; padding: 52px 24px; }
    .empty-icon  { margin-bottom: 14px; }
    .empty-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .empty-desc  { font-size: 14px; color: #64748b; line-height: 1.55; }

    /* ── PROFILE ─────────────────────────────────────── */
    .profile-section { margin-bottom: 22px; }
    .profile-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .7px; color: #94a3b8; margin-bottom: 10px;
    }
    .pill-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill {
      padding: 8px 15px; border-radius: 20px; border: none;
      box-shadow: 0 0 0 1.5px #e2e8f0;
      background: #fff; font-size: 13px; font-weight: 500; color: #475569;
      cursor: pointer; user-select: none;
    }
    .pill:active { background: #f1f5f9; }
    .pill.sel { background: #1a2f5e; box-shadow: 0 0 0 1.5px #1a2f5e; color: #fff; }

    /* ── FOR YOU ─────────────────────────────────────── */
    .fy-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .fy-edit {
      font-size: 12px; color: #2563eb; background: none;
      border: none; cursor: pointer; padding: 0; font-weight: 600;
    }
    .personalize-card {
      background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
      border-radius: 16px;
      padding: 14px 16px; margin-bottom: 16px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
      box-shadow: 0 6px 20px rgba(37,99,235,0.25);
    }
    .personalize-card:active { opacity: 0.92; }
    .fy-title { font-size: 14px; font-weight: 700; color: #fff; }
    .fy-sub   { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 2px; }
    .divider-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .7px; color: #94a3b8; margin: 18px 0 10px;
    }

    /* ── SUPPORT LINK ────────────────────────────────── */
    .support-wrap { text-align: center; margin-top: 20px; padding-bottom: 4px; }
    .support-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 13px; color: #94a3b8; text-decoration: none;
    }
    .support-link:hover { color: #64748b; }

    /* ── BOTTOM NAV ──────────────────────────────────── */
    .bottom-nav {
      flex-shrink: 0;
      display: flex;
      background: #fff;
      box-shadow: 0 -1px 0 rgba(15,23,42,0.06), 0 -4px 24px rgba(15,23,42,0.07);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-btn {
      flex: 1; background: none; border: none;
      padding: 10px 0 11px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      cursor: pointer; color: #94a3b8;
      font-size: 10px; font-weight: 600; letter-spacing: .3px;
    }
    .nav-btn.active { color: #2563eb; }
    .nav-btn svg { display: block; }

    /* ── PAGE TRANSITION ─────────────────────────────────── */
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: none; }
    }
    .content.page-in { animation: pageIn 0.2s ease-out both; }

    /* ── SEARCH CATEGORY CHIPS ───────────────────────────── */
    .cat-chips {
      display: flex; gap: 6px; flex-wrap: nowrap;
      overflow-x: auto; margin-bottom: 14px; padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .cat-chips::-webkit-scrollbar { display: none; }
    .cat-chip {
      padding: 7px 13px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1.5px solid #e2e8f0; background: #fff; color: #64748b;
      cursor: pointer; user-select: none; white-space: nowrap; flex-shrink: 0;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .cat-chip:active { transform: scale(0.95); }

    /* ── SEARCH HIGHLIGHT ────────────────────────────────── */
    mark {
      background: rgba(37,99,235,0.12);
      color: #1d4ed8;
      border-radius: 2px;
      padding: 0 1px;
      font-style: normal;
    }

    /* ── WARNING CARD ────────────────────────────────────── */
    .warning-card {
      background: #fef2f2 !important;
      box-shadow: 0 0 0 1px #fca5a5 !important;
    }

    /* ── DARK MODE ───────────────────────────────────────── */
    @media (prefers-color-scheme: dark) {
      body { background: #0f1729; color: #f1f5f9; }

      .cat-card {
        background: #1e293b;
        box-shadow: 0 2px 14px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06);
      }
      .cat-card:active { background: #263348; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
      .cat-name  { color: #f1f5f9; }
      .cat-count { color: #64748b; }

      .topic-item {
        background: #1e293b;
        box-shadow: 0 1px 8px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05);
      }
      .topic-item:active { background: #263348; }
      .ttitle { color: #f1f5f9; }
      .tmeta  { color: #64748b; }
      .chevron { color: #475569; }

      .summary-card {
        background: #1e293b;
        box-shadow: 0 1px 8px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05);
      }
      .summary-text  { color: #cbd5e1; }
      .summary-empty { color: #64748b; }

      .btn-secondary {
        background: #1e293b; color: #f1f5f9;
        box-shadow: 0 1px 8px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.1);
      }
      .btn-secondary:active { background: #263348; }

      .tag { background: rgba(37,99,235,0.2); color: #60a5fa; }

      .search-input {
        background: #1e293b; color: #f1f5f9;
        box-shadow: 0 1px 8px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.08);
      }
      .search-input::placeholder { color: #475569; }
      .search-input:focus { box-shadow: 0 0 0 2px #2563eb, 0 1px 12px rgba(37,99,235,0.15); }
      .search-icon { color: #475569; }

      .pill {
        background: #1e293b; color: #94a3b8;
        box-shadow: 0 0 0 1.5px #334155;
      }
      .pill:active { background: #263348; }
      .pill.sel { background: #2563eb; box-shadow: 0 0 0 1.5px #2563eb; color: #fff; }

      .bottom-nav {
        background: #1a2535;
        box-shadow: 0 -1px 0 rgba(255,255,255,0.06), 0 -4px 24px rgba(0,0,0,0.35);
      }
      .nav-btn { color: #475569; }
      .nav-btn.active { color: #60a5fa; }

      .slabel, .divider-label, .profile-label, .verified-note { color: #475569; }
      .support-link { color: #475569; }
      .support-link:hover { color: #64748b; }
      .empty-desc  { color: #64748b; }
      .empty-title { color: #f1f5f9; }
      .fy-edit { color: #60a5fa; }
      .fav-dot { background: #f87171; }

      .personalize-card { box-shadow: 0 6px 20px rgba(37,99,235,0.2); }

      mark { background: rgba(96,165,250,0.2); color: #60a5fa; }

      .cat-chip { background: #1e293b; border-color: #334155; color: #64748b; }

      .warning-card {
        background: #3b0f0f !important;
        box-shadow: 0 0 0 1px #7f1d1d !important;
      }
      .warning-card p { color: #fca5a5 !important; }

      #ask-input {
        background: #1e293b !important;
        color: #f1f5f9 !important;
        border-color: #334155 !important;
      }
      #ask-input::placeholder { color: #475569; }
    }
  </style>
</head>

let S = { screen:"home", category:null, topicId:null, prev:"home", query:"", searchCat:null };

let CONFIG = { donation_active: false, donation_link: "" };

// ── PROFILE ───────────────────────────────────────────────────────────────────
let PROFILE = JSON.parse(localStorage.getItem("mil-profile") || "null");

function setProfile(key, value) {
  if (!PROFILE) PROFILE = { status: null, branch: "all-branches", rankType: "all-ranks" };
  PROFILE[key] = (key === "status" && PROFILE.status === value) ? null : value;
  if (!PROFILE.status) { PROFILE = null; localStorage.removeItem("mil-profile"); }
  else localStorage.setItem("mil-profile", JSON.stringify(PROFILE));
  if (S.screen === "profile") renderProfile();
}

function clearProfile() {
  PROFILE = null;
  localStorage.removeItem("mil-profile");
  go("home");
}

function matchesProfile(t) {
  if (!PROFILE || !PROFILE.status) return false;
  if (!t.etiketler.includes(PROFILE.status)) return false;
  const okBranch = t.etiketler.includes("all-branches") ||
                   PROFILE.branch === "all-branches" ||
                   t.etiketler.includes(PROFILE.branch);
  if (!okBranch) return false;
  return t.etiketler.includes("all-ranks") ||
         PROFILE.rankType === "all-ranks" ||
         t.etiketler.includes(PROFILE.rankType);
}

function toggleFav(id) {
  const i = favs.indexOf(id);
  i === -1 ? favs.push(id) : favs.splice(i, 1);
  saveFavs();
  render();
}

// ── NAVIGATE ──────────────────────────────────────────────────────────────────
function go(screen, params={}) {
  S = { ...S, prev: S.screen, screen, ...params };
  document.getElementById("ct").scrollTop = 0;
  render();
}

const $h = (html, gradient) => {
  const el = document.getElementById("hd");
  el.innerHTML = html;
  el.style.background = gradient || HOME_GRADIENT;
};
const $c = html => { document.getElementById("ct").innerHTML = html; };

function chevronSvg() {
  return `<span class="chevron"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>`;
}

function topicRow(t) {
  const isFav = favs.includes(t.id);
  return `<div class="topic-item" onclick="go('topic',{topicId:'${t.id}',category:'${t.ana_baslik}'})">

    ${isFav ? '<span class="fav-dot"></span>' : ''}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  ["home","search","favorites","profile","ask"].forEach(id => {
    const btn = document.getElementById("nb-" + id);
    if (!btn) return;
    const active = id === "home"
      ? ["home","category","topic","about"].includes(S.screen)
      : S.screen === id;
    btn.classList.toggle("active", active);
  });
  const h = document.getElementById("heart-svg");
  if (h) { h.setAttribute("fill", favs.length ? "currentColor" : "none"); }
  const pb = document.getElementById("nb-profile");
  if (pb) pb.style.color = (PROFILE && S.screen !== "profile") ? "#2563eb" : "";

  const ct = document.getElementById("ct");
  ct.classList.remove("page-in");
  void ct.offsetWidth;
  ct.classList.add("page-in");

  const screens = { home:renderHome, category:renderCategory, topic:renderTopic, search:renderSearch, favorites:renderFavorites, profile:renderProfile, about:renderAbout, ask:renderAsk };
  (screens[S.screen] || renderHome)();
}

function renderSearch() {

  const chips = [{ id: null, name: "All" }, ...CATS].map(c => {
    const active = S.searchCat === c.id;
    let style = '';
    if (active && c.id) {
      const cat = CATS.find(x => x.id === c.id);
      style = `background:${cat.color};color:#fff;border-color:transparent;box-shadow:0 2px 8px ${cat.color}55`;
    } else if (active) {
      style = 'background:#1a2f5e;color:#fff;border-color:transparent';
    }
    const catArg = c.id ? `'${c.id}'` : 'null';
    return `<button class="cat-chip${active ? ' sel' : ''}" data-cat="${c.id || 'all'}" style="${style}" onclick="setSearchCat(${catArg})">${c.name}</button>`;
  }).join('');

  $c(`<div class="search-wrap">
        <span class="search-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
        </span>
        <input id="sq" class="search-input" type="search" placeholder="Topic, benefit, or tag…"
          value="${S.query.replace(/"/g,'&quot;')}"
          oninput="S.query=this.value;updateResults()">
      </div>
      <div class="cat-chips">${chips}</div>
      <div id="results"></div>`);

  const el = document.getElementById("sq");
  if (el) { el.focus(); const l = el.value.length; el.setSelectionRange(l,l); }
  updateResults();
}

function setSearchCat(id) {
  S.searchCat = (S.searchCat === id) ? null : id;
  document.querySelectorAll('.cat-chip').forEach(btn => {
    const btnCat = btn.dataset.cat;
    const isAll  = btnCat === 'all';
    const active = isAll ? S.searchCat === null : btnCat === S.searchCat;
    btn.classList.toggle('sel', active);
    if (active && !isAll) {
      const cat = CATS.find(c => c.id === btnCat);
      btn.style.cssText = cat
        ? `background:${cat.color};color:#fff;border-color:transparent;box-shadow:0 2px 8px ${cat.color}55`
        : '';
    } else if (active && isAll) {
      btn.style.cssText = 'background:#1a2f5e;color:#fff;border-color:transparent';
    } else {
      btn.style.cssText = '';
    }
  });
  updateResults();
}

function hl(text, q) {
  if (!q || !text) return text || '';
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${esc})`, 'gi'), '<mark>$1</mark>');
}

function scoreMatch(t, q) {
  const title   = t.baslik.toLowerCase();
  const summary = (t.ozet || '').toLowerCase();
  const source  = t.kaynak_adi.toLowerCase();
  if (title === q)               return 100;
  if (title.startsWith(q))      return 70;
  if (title.includes(q))        return 50;
  if (t.etiketler.some(g => g.includes(q))) return 30;
  if (source.includes(q))       return 20;
  if (t.ana_baslik.includes(q)) return 20;
  if (summary.includes(q))      return 8;
  return 0;
}

function topicRowHL(t, q) {
  const isFav = favs.includes(t.id);
  const title = q ? hl(t.baslik, q) : t.baslik;
  const meta  = q ? hl(t.kaynak_adi, q) : t.kaynak_adi;
  return `<div class="topic-item" onclick="go('topic',{topicId:'${t.id}',category:'${t.ana_baslik}'})">
    <div class="tinfo">
      <div class="ttitle">${title}</div>
      <div class="tmeta">${meta}</div>
    </div>
    ${isFav ? '<span class="fav-dot"></span>' : ''}
    ${chevronSvg()}
  </div>`;
}

function updateResults() {
  const q  = S.query.toLowerCase().trim();
  const el = document.getElementById("results");
  if (!el) return;

  if (!q && !S.searchCat) {
    el.innerHTML = `<div class="empty">
      <div class="empty-icon"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg></div>
      <div class="empty-title">Search topics</div>
      <div class="empty-desc">Type a keyword, or filter by category above.</div>
    </div>`;
    return;
  }

  let pool = S.searchCat ? DATA.konular.filter(t => t.ana_baslik === S.searchCat) : DATA.konular;

  let hits;
  if (q) {
    hits = pool
      .map(t => ({ t, s: scoreMatch(t, q) }))
      .filter(x => x.s > 0)
      .sort((a, b) => b.s - a.s)
      .map(x => x.t);
  } else {
    hits = pool;
  }

  const catName = S.searchCat ? CATS.find(c => c.id === S.searchCat)?.name : null;
  const scope   = catName ? ` in ${catName}` : '';

  el.innerHTML = hits.length
    ? `<div class="slabel">${hits.length} result${hits.length!==1?"s":""}${scope}</div>` + hits.map(t => topicRowHL(t, q)).join("")
    : `<div class="empty">
        <div class="empty-title">No results${q ? ` for "${q}"` : ''}${scope}</div>
        <div class="empty-desc">${q ? 'Try a different keyword or clear the category filter.' : 'No topics in this category yet.'}</div>
      </div>`;
}

function askScore(topic, qLower) {
  let score = 0;
  const topicTags = topic.etiketler || [];
  const topicCat = topic.ana_baslik;
  for (const rule of ASK_MAP) {
    if (!rule.words.some(w => qLower.includes(w))) continue;
    if (rule.tags) score += rule.tags.filter(t => topicTags.includes(t)).length * 12;
    if (rule.cats && rule.cats.includes(topicCat)) score += 8;
  }
  const words = qLower.split(/\W+/).filter(w => w.length > 3);
  const hay = (topic.baslik + " " + topic.ozet).toLowerCase();
  words.forEach(w => { if (hay.includes(w)) score += 2; });
  return score;
}

function handleAsk() {
  const input = document.getElementById("ask-input");
  if (!input) return;
  const q = input.value.trim();
  if (!q) return;
  const qLower = q.toLowerCase();
  const scored = DATA.konular
    .map(t => ({ t, score: askScore(t, qLower) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 8);

  const container = document.getElementById("ask-results");
  if (!container) return;
  if (!scored.length) {
    container.innerHTML = `<div style="text-align:center;padding:40px 16px;color:#94a3b8">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 12px;display:block"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      <div style="font-size:15px;font-weight:600;color:#64748b;margin-bottom:6px">No matches found</div>
      <div style="font-size:13px">Try different words — for example: "health care for my family" or "education after leaving the army"</div>
    </div>`;
    return;
  }
  container.innerHTML = `<div class="slabel" style="margin-bottom:10px">Top matches for your situation</div>` +
    scored.map(x => topicRow(x.t)).join("");
}
