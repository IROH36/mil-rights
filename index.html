<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mil-Rights — U.S. Military Rights Guide</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #eef1f7;
      color: #0f172a;
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── DISCLAIMER ──────────────────────────────────── */
    .disclaimer {
      flex-shrink: 0;
      background: #991b1b;
      color: #fff;
      text-align: center;
      padding: 6px 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    /* ── HEADER ──────────────────────────────────────── */
    .header {
      flex-shrink: 0;
      color: #fff;
      padding: 14px 16px 13px;
    }
    .hrow { display: flex; align-items: center; gap: 6px; }
    .back-btn {
      background: none; border: none; color: rgba(255,255,255,0.8);
      font-size: 28px; line-height: 1; cursor: pointer;
      padding: 0 4px 0 0; margin-left: -4px;
    }
    .htitle { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .hsub   { font-size: 12px; color: rgba(255,255,255,.55); margin-top: 2px; }

    /* ── CONTENT ─────────────────────────────────────── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }

    /* ── CATEGORY GRID ───────────────────────────────── */
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .cat-card {
      background: #fff;
      border-radius: 18px;
      padding: 20px 12px 17px;
      box-shadow: 0 2px 14px rgba(15,23,42,0.09), 0 0 0 1px rgba(15,23,42,0.05);
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .cat-card:active { transform: scale(0.97); box-shadow: 0 1px 6px rgba(15,23,42,0.07); }
    .cat-icon {
      width: 54px; height: 54px; border-radius: 15px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px;
    }
    .cat-name  { font-size: 13px; font-weight: 700; line-height: 1.3; color: #0f172a; }
    .cat-count { font-size: 11px; color: #94a3b8; margin-top: 4px; font-weight: 500; }

    /* ── TOPIC LIST ITEM ─────────────────────────────── */
    .topic-item {
      background: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 8px;
      box-shadow: 0 1px 8px rgba(15,23,42,0.07), 0 0 0 1px rgba(15,23,42,0.04);
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; user-select: none;
    }
    .topic-item:active { background: #f8fafc; }
    .tinfo  { flex: 1; min-width: 0; }
    .ttitle { font-size: 15px; font-weight: 600; line-height: 1.3; color: #0f172a; }
    .tmeta  { font-size: 12px; color: #64748b; margin-top: 3px; font-weight: 500; }
    .fav-dot { width: 8px; height: 8px; background: #dc2626; border-radius: 50%; flex-shrink: 0; }
    .chevron { color: #cbd5e1; flex-shrink: 0; }
    .chevron svg { display: block; }
    .personalize-card .chevron { color: rgba(255,255,255,.5); }

    /* ── TOPIC DETAIL ────────────────────────────────── */
    .detail-head {
      color: #fff;
      padding: 22px 16px 18px;
      margin: -16px -16px 16px;
    }
    .detail-title  { font-size: 20px; font-weight: 700; line-height: 1.35; }
    .source-badge  {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,.15); border-radius: 20px;
      padding: 4px 12px; font-size: 12px; margin-top: 10px;
      font-weight: 600;
    }
    .summary-card {
      background: #fff; border-radius: 16px;
      padding: 18px; margin-bottom: 12px;
      box-shadow: 0 1px 8px rgba(15,23,42,0.07), 0 0 0 1px rgba(15,23,42,0.04);
    }
    .summary-text  { font-size: 15px; line-height: 1.7; color: #334155; }
    .summary-empty { font-size: 14px; color: #94a3b8; font-style: italic; }

    /* ── BUTTONS ─────────────────────────────────────── */
    .btn {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; width: 100%; border-radius: 14px; padding: 15px;
      font-size: 15px; font-weight: 600; cursor: pointer; border: none;
      margin-bottom: 10px; text-decoration: none;
    }
    .btn-primary {
      background: #2563eb; color: #fff;
      box-shadow: 0 4px 16px rgba(37,99,235,0.28);
    }
    .btn-primary:active { background: #1d4ed8; box-shadow: none; }
    .btn-secondary {
      background: #fff; color: #1e293b; font-weight: 500;
      box-shadow: 0 1px 8px rgba(15,23,42,0.07), 0 0 0 1px rgba(15,23,42,0.08);
    }
    .btn-secondary:active { background: #f8fafc; }
    .btn-fav {
      color: #dc2626 !important;
      box-shadow: 0 0 0 1.5px #fca5a5, 0 1px 8px rgba(15,23,42,0.05) !important;
    }

    /* ── TAGS ────────────────────────────────────────── */
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag {
      background: #eff6ff; color: #2563eb;
      border-radius: 20px; padding: 3px 10px;
      font-size: 11px; font-weight: 600;
    }
    .verified-note { font-size: 11px; color: #94a3b8; text-align: center; margin-top: 16px; }

    /* ── SEARCH ──────────────────────────────────────── */
    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-input {
      width: 100%; padding: 13px 16px 13px 44px;
      border: none; border-radius: 14px;
      font-size: 15px; background: #fff; outline: none; color: #0f172a;
      box-shadow: 0 1px 8px rgba(15,23,42,0.07), 0 0 0 1px rgba(15,23,42,0.07);
    }
    .search-input:focus { box-shadow: 0 0 0 2px #2563eb, 0 1px 12px rgba(37,99,235,0.12); }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; pointer-events: none; }

    /* ── SECTION LABEL ───────────────────────────────── */
    .slabel {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .7px; color: #94a3b8; margin-bottom: 10px;
    }

    /* ── EMPTY STATE ─────────────────────────────────── */
    .empty { text-align: center; padding: 52px 24px; }
    .empty-icon  { margin-bottom: 14px; }
    .empty-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .empty-desc  { font-size: 14px; color: #64748b; line-height: 1.55; }

    /* ── PROFILE ─────────────────────────────────────── */
    .profile-section { margin-bottom: 22px; }
    .profile-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .7px; color: #94a3b8; margin-bottom: 10px;
    }
    .pill-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill {
      padding: 8px 15px; border-radius: 20px; border: none;
      box-shadow: 0 0 0 1.5px #e2e8f0;
      background: #fff; font-size: 13px; font-weight: 500; color: #475569;
      cursor: pointer; user-select: none;
    }
    .pill:active { background: #f1f5f9; }
    .pill.sel { background: #1a2f5e; box-shadow: 0 0 0 1.5px #1a2f5e; color: #fff; }

    /* ── FOR YOU ─────────────────────────────────────── */
    .fy-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .fy-edit {
      font-size: 12px; color: #2563eb; background: none;
      border: none; cursor: pointer; padding: 0; font-weight: 600;
    }
    .personalize-card {
      background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
      border-radius: 16px;
      padding: 14px 16px; margin-bottom: 16px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
      box-shadow: 0 6px 20px rgba(37,99,235,0.25);
    }
    .personalize-card:active { opacity: 0.92; }
    .fy-title { font-size: 14px; font-weight: 700; color: #fff; }
    .fy-sub   { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 2px; }
    .divider-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .7px; color: #94a3b8; margin: 18px 0 10px;
    }

    /* ── SUPPORT LINK ────────────────────────────────── */
    .support-wrap { text-align: center; margin-top: 20px; padding-bottom: 4px; }
    .support-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 13px; color: #94a3b8; text-decoration: none;
    }
    .support-link:hover { color: #64748b; }

    /* ── BOTTOM NAV ──────────────────────────────────── */
    .bottom-nav {
      flex-shrink: 0;
      display: flex;
      background: #fff;
      box-shadow: 0 -1px 0 rgba(15,23,42,0.06), 0 -4px 24px rgba(15,23,42,0.07);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-btn {
      flex: 1; background: none; border: none;
      padding: 10px 0 11px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      cursor: pointer; color: #94a3b8;
      font-size: 10px; font-weight: 600; letter-spacing: .3px;
    }
    .nav-btn.active { color: #2563eb; }
    .nav-btn svg { display: block; }
  </style>
</head>

// ── STATE ─────────────────────────────────────────────────────────────────────
let S = { screen:"home", category:null, topicId:null, prev:"home", query:"" };
let favs = JSON.parse(localStorage.getItem("mil-favs") || "[]");
const saveFavs = () => localStorage.setItem("mil-favs", JSON.stringify(favs));

// ── REMOTE CONFIG ─────────────────────────────────────────────────────────────
let CONFIG = { donation_active: false, donation_link: "" };

// ── PROFILE ───────────────────────────────────────────────────────────────────
let PROFILE = JSON.parse(localStorage.getItem("mil-profile") || "null");

function setProfile(key, value) {
  if (!PROFILE) PROFILE = { status: null, branch: "all-branches", rankType: "all-ranks" };
  PROFILE[key] = (key === "status" && PROFILE.status === value) ? null : value;
  if (!PROFILE.status) { PROFILE = null; localStorage.removeItem("mil-profile"); }
  else localStorage.setItem("mil-profile", JSON.stringify(PROFILE));
  if (S.screen === "profile") renderProfile();
}

function clearProfile() {
  PROFILE = null;
  localStorage.removeItem("mil-profile");
  go("home");
}

function matchesProfile(t) {
  if (!PROFILE || !PROFILE.status) return false;
  if (!t.etiketler.includes(PROFILE.status)) return false;
  const okBranch = t.etiketler.includes("all-branches") ||
                   PROFILE.branch === "all-branches" ||
                   t.etiketler.includes(PROFILE.branch);
  if (!okBranch) return false;
  return t.etiketler.includes("all-ranks") ||
         PROFILE.rankType === "all-ranks" ||
         t.etiketler.includes(PROFILE.rankType);
}

function toggleFav(id) {
  const i = favs.indexOf(id);
  i === -1 ? favs.push(id) : favs.splice(i, 1);
  saveFavs();
  render();
}

// ── NAVIGATE ──────────────────────────────────────────────────────────────────
function go(screen, params={}) {
  S = { ...S, prev: S.screen, screen, ...params };
  document.getElementById("ct").scrollTop = 0;
  render();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const $h = (html, gradient) => {
  const el = document.getElementById("hd");
  el.innerHTML = html;
  el.style.background = gradient || HOME_GRADIENT;
};
const $c = html => { document.getElementById("ct").innerHTML = html; };

function chevronSvg() {
  return `<span class="chevron"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>`;
}

function topicRow(t) {
  const isFav = favs.includes(t.id);
  return `<div class="topic-item" onclick="go('topic',{topicId:'${t.id}',category:'${t.ana_baslik}'})">
    <div class="tinfo">
      <div class="ttitle">${t.baslik}</div>
      <div class="tmeta">${t.kaynak_adi}</div>
    </div>
    ${isFav ? '<span class="fav-dot"></span>' : ''}
    ${chevronSvg()}
  </div>`;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  ["home","search","favorites","profile"].forEach(id => {
    const btn = document.getElementById("nb-" + id);
    if (!btn) return;
    const active = id === "home"
      ? ["home","category","topic","about"].includes(S.screen)
      : S.screen === id;
    btn.classList.toggle("active", active);
  });
  const h = document.getElementById("heart-svg");
  if (h) { h.setAttribute("fill", favs.length ? "currentColor" : "none"); }
  const pb = document.getElementById("nb-profile");
  if (pb) pb.style.color = (PROFILE && S.screen !== "profile") ? "#2563eb" : "";

  const screens = { home:renderHome, category:renderCategory, topic:renderTopic, search:renderSearch, favorites:renderFavorites, profile:renderProfile, about:renderAbout };
  (screens[S.screen] || renderHome)();
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function renderHome() {
  $h(`<div class="hrow" style="justify-content:space-between">
        <span class="htitle">Mil-Rights</span>
        <button onclick="go('about')" aria-label="About" style="background:none;border:none;color:rgba(255,255,255,.65);cursor:pointer;padding:4px;line-height:1">

        </button>
      </div>
      <div class="hsub">Know your rights — find the official source.</div>`);

  let topHtml = "";
  if (PROFILE && PROFILE.status) {
    const matched = DATA.konular.filter(matchesProfile);
    if (matched.length) {
      topHtml = `<div class="fy-head">
          <span class="slabel" style="margin-bottom:0">For You</span>
          <button class="fy-edit" onclick="go('profile')">Edit Profile</button>
        </div>

  } else {
    topHtml = `<div class="personalize-card" onclick="go('profile')">
        <div>
          <div class="fy-title">Get topics for your situation</div>
          <div class="fy-sub">Set up your profile →</div>
        </div>
        ${chevronSvg()}
      </div>`;
  }

  const cards = CATS.map(c => {
    const n = DATA.konular.filter(t => t.ana_baslik === c.id).length;
    return `<div class="cat-card" onclick="go('category',{category:'${c.id}'})">
      <div class="cat-icon" style="background:${c.bg};color:${c.color}">${catIcon(c.id)}</div>
      <div class="cat-name">${c.name}</div>
      <div class="cat-count">${n} topic${n!==1?"s":""}</div>
    </div>`;
  }).join("");

  const supportHtml = (CONFIG.donation_active && CONFIG.donation_link)
    ? `<div class="support-wrap">
        <a href="${CONFIG.donation_link}" target="_blank" rel="noopener noreferrer" class="support-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">

          </svg>
          Support this project
        </a>
      </div>`
    : "";

  $c(`${topHtml}<div class="grid">${cards}</div>${supportHtml}`);
}

// ── CATEGORY ──────────────────────────────────────────────────────────────────
function renderCategory() {
  const cat = CATS.find(c => c.id === S.category) || CATS[0];

  );
}

// ── TOPIC ─────────────────────────────────────────────────────────────────────
function renderTopic() {
  const t = DATA.konular.find(k => k.id === S.topicId);
  if (!t) { go("home"); return; }
  const isFav = favs.includes(t.id);
  const cat = CATS.find(c => c.id === t.ana_baslik);
  const headerGrad = cat ? cat.gradient : HOME_GRADIENT;

  const backFn = S.prev === "search"    ? "go('search')"
               : S.prev === "favorites" ? "go('favorites')"
               : `go('category',{category:'${t.ana_baslik}'})`;

  $h(`<div class="hrow">
        <button class="back-btn" onclick="${backFn}" aria-label="Back">&#8249;</button>
        <span class="htitle">Know Your Rights</span>
      </div>`, headerGrad);

  const summaryHtml = t.ozet
    ? `<p class="summary-text">${t.ozet}</p>`
    : `<p class="summary-empty">Summary not yet available — content for this topic is being verified directly from the official source.</p>`;

  const tags = t.etiketler.map(g => `<span class="tag">${g}</span>`).join("");

  $c(`<div class="detail-head" style="background:${headerGrad}">
        <div class="detail-title">${t.baslik}</div>
        <span class="source-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          ${t.kaynak_adi}

      </div>

      <div class="summary-card">${summaryHtml}</div>

      <a href="${t.resmi_link}" target="_blank" rel="noopener noreferrer" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Go to Official Page
      </a>

      <button class="btn btn-secondary ${isFav ? "btn-fav" : ""}" onclick="toggleFav('${t.id}')">
        <svg width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="${isFav ? "currentColor" : "none"}">
          <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
        </svg>

      <div style="margin-top:8px">
        <div class="slabel">Tags</div>
        <div class="tag-list">${tags}</div>

  );
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
function renderSearch() {
  $h(`<div class="hrow"><span class="htitle">Search</span></div>`);
  $c(`<div class="search-wrap">
        <span class="search-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
        </span>
        <input id="sq" class="search-input" type="search" placeholder="Topic, benefit, or tag…"
          value="${S.query.replace(/"/g,'&quot;')}"
          oninput="S.query=this.value;updateResults()">
      </div>
      <div id="results"></div>`);

  const el = document.getElementById("sq");
  if (el) { el.focus(); const l = el.value.length; el.setSelectionRange(l,l); }
  updateResults();
}

function updateResults() {
  const q = S.query.toLowerCase().trim();
  const el = document.getElementById("results");
  if (!el) return;

  if (!q) {
    el.innerHTML = `<div class="empty">
      <div class="empty-icon"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg></div>
      <div class="empty-title">Search topics</div>
      <div class="empty-desc">Type a keyword, benefit name, or tag like "veteran" or "tricare".</div>
    </div>`;
    return;
  }

  const hits = DATA.konular.filter(t =>
    t.baslik.toLowerCase().includes(q) ||
    t.kaynak_adi.toLowerCase().includes(q) ||
    t.etiketler.some(g => g.includes(q)) ||
    t.ana_baslik.includes(q) ||
    t.ozet.toLowerCase().includes(q)
  );

  el.innerHTML = hits.length
    ? `<div class="slabel">${hits.length} result${hits.length!==1?"s":""}</div>` + hits.map(topicRow).join("")
    : `<div class="empty">
        <div class="empty-title">No results for "${q}"</div>
        <div class="empty-desc">Try a different keyword or browse by category.</div>
      </div>`;
}

// ── PROFILE ───────────────────────────────────────────────────────────────────
function renderProfile() {
  $h(`<div class="hrow">
        <button class="back-btn" onclick="go('home')" aria-label="Back">&#8249;</button>
        <span class="htitle">Your Profile</span>
      </div>
      <div class="hsub">Topics will be matched to your situation.</div>`);

  const p = PROFILE || { status: null, branch: "all-branches", rankType: "all-ranks" };

  const STATUSES = [
    { id:"active-duty",    label:"Active Duty" },
    { id:"veteran",        label:"Veteran" },
    { id:"reservist",      label:"Reservist" },
    { id:"national-guard", label:"National Guard" },
    { id:"family-member",  label:"Family Member" },
    { id:"green-card",     label:"Green-Card Service Member" },
  ];
  const BRANCHES = [
    { id:"all-branches", label:"Any Branch" },
    { id:"army",         label:"Army" },
    { id:"navy",         label:"Navy" },
    { id:"marines",      label:"Marines" },
    { id:"air-force",    label:"Air Force" },
    { id:"space-force",  label:"Space Force" },
    { id:"coast-guard",  label:"Coast Guard" },
  ];
  const RANKS = [
    { id:"all-ranks",       label:"Any Rank" },
    { id:"enlisted",        label:"Enlisted" },
    { id:"officer",         label:"Officer" },
    { id:"warrant-officer", label:"Warrant Officer" },
  ];

  const pills = (list, key, current) => list.map(o =>
    `<button class="pill ${current === o.id ? "sel" : ""}" onclick="setProfile('${key}','${o.id}')">${o.label}</button>`
  ).join("");

  const matchCount = PROFILE ? DATA.konular.filter(matchesProfile).length : 0;
  const matchNote = PROFILE && PROFILE.status
    ? `<p style="font-size:13px;color:#64748b;margin-bottom:20px">${matchCount} topic${matchCount!==1?"s":""} match your profile.</p>`
    : `<p style="font-size:13px;color:#94a3b8;margin-bottom:20px">Select your status to see matched topics on the home screen.</p>`;

  $c(`${matchNote}
    <div class="profile-section">
      <div class="profile-label">I am a…</div>
      <div class="pill-group">${pills(STATUSES,"status",p.status)}</div>
    </div>
    <div class="profile-section">
      <div class="profile-label">My branch <span style="font-weight:400;text-transform:none;color:#94a3b8;letter-spacing:0">(optional)</span></div>
      <div class="pill-group">${pills(BRANCHES,"branch",p.branch||"all-branches")}</div>
    </div>
    <div class="profile-section">
      <div class="profile-label">My rank type <span style="font-weight:400;text-transform:none;color:#94a3b8;letter-spacing:0">(optional)</span></div>
      <div class="pill-group">${pills(RANKS,"rankType",p.rankType||"all-ranks")}</div>
    </div>
    <button class="btn btn-primary" onclick="go('home')" style="margin-top:4px">Done</button>
    ${PROFILE ? `<button class="btn btn-secondary" onclick="clearProfile()">Clear Profile</button>` : ""}
  `);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
fetch("uzak-ayarlar.json")
  .then(r => r.ok ? r.json() : Promise.reject())
  .then(cfg => { CONFIG = cfg; if (S.screen === "home") renderHome(); })
  .catch(() => {});
</script>
